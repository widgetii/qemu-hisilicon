name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build QEMU
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build meson pkg-config \
            libglib2.0-dev libpixman-1-dev libfdt-dev zlib1g-dev \
            python3 python3-venv git gcc-arm-linux-gnueabi libc6-dev-armel-cross

      - name: Build QEMU
        run: bash qemu/setup.sh

      - name: Build IVE test initramfs
        run: |
          arm-linux-gnueabi-gcc -static -O2 -o /tmp/test-ive-init \
            qemu-boot/test-ive-ops.c
          mkdir -p /tmp/initramfs
          cp /tmp/test-ive-init /tmp/initramfs/init
          (cd /tmp/initramfs && echo init | cpio -o -H newc) > qemu-boot/test-ive.cpio

      - name: Verify machines
        run: |
          count=$(./qemu-src/build/qemu-system-arm -machine help | grep -cE '(hi35|gk7)')
          echo "Registered machines: $count"
          ./qemu-src/build/qemu-system-arm -machine help | grep -E '(hi35|gk7)'
          [ "$count" -ge 21 ]

      - name: Upload QEMU binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/qemu-system-arm
          retention-days: 1

      - name: Upload IVE test initramfs
        uses: actions/upload-artifact@v4
        with:
          name: ive-test-cpio
          path: qemu-boot/test-ive.cpio
          retention-days: 1

  net-test:
    name: EV300 network (U-Boot + Linux ping)
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfdt1 libglib2.0-0 libpixman-1-0

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Download firmware
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.hi3516ev300-nor-lite.tgz" \
              -o openipc.hi3516ev300-nor-lite.tgz
          tar xzf openipc.hi3516ev300-nor-lite.tgz

      - name: Download U-Boot
        run: |
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/u-boot-hi3516ev300-universal.bin" \
              -o /tmp/u-boot-ev300.bin

      - name: Build flash image
        run: |
          FLASH=/tmp/flash_ev300.bin
          dd if=/dev/zero of=$FLASH bs=1M count=8 2>/dev/null
          dd if=/tmp/u-boot-ev300.bin of=$FLASH bs=1 conv=notrunc 2>/dev/null
          dd if=qemu-boot/uImage.hi3516ev300 of=$FLASH bs=1 seek=$((0x50000)) conv=notrunc 2>/dev/null
          dd if=qemu-boot/rootfs.squashfs.hi3516ev300 of=$FLASH bs=1 seek=$((0x350000)) conv=notrunc 2>/dev/null

      - name: "Test: U-Boot ping"
        timeout-minutes: 2
        run: |
          QEMU=./qemu-src/build/qemu-system-arm
          {
            sleep 1; printf '\x03\n\x03\n'; sleep 3
            echo "setenv ipaddr 10.0.2.15"
            echo "setenv serverip 10.0.2.2"
            echo "setenv gatewayip 10.0.2.2"
            echo "setenv netmask 255.255.255.0"
            sleep 1
            echo "ping 10.0.2.2"
            sleep 8
          } | timeout 30 $QEMU -M hi3516ev300 -m 128M \
                -global hisi-fmc.flash-file=/tmp/flash_ev300.bin \
                -nographic -serial mon:stdio -nic user \
                2>&1 | tee /tmp/uboot-net.txt

          echo ""
          echo "=== U-Boot ping result ==="
          if grep -q "is alive" /tmp/uboot-net.txt; then
            echo "PASS: U-Boot ping succeeded"
          else
            echo "FAIL: U-Boot ping failed"
            exit 1
          fi

      - name: "Test: Linux ping"
        timeout-minutes: 3
        run: |
          QEMU=./qemu-src/build/qemu-system-arm
          {
            sleep 60
            echo "root"
            sleep 2
            echo "12345"
            sleep 3
            echo 'killall udhcpc 2>/dev/null; ip addr flush dev eth0; ip addr add 10.0.2.15/24 dev eth0; ip link set eth0 up; ip route add default via 10.0.2.2; ping -c 3 10.0.2.2'
            sleep 10
          } | timeout 90 $QEMU -M hi3516ev300 -m 128M \
                -kernel qemu-boot/uImage.hi3516ev300 \
                -initrd qemu-boot/rootfs.squashfs.hi3516ev300 \
                -nographic -serial mon:stdio \
                -append "console=ttyAMA0,115200 earlyprintk mem=96M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data) mmz_allocator=hisi mmz=anonymous,0,0x46000000,32M" \
                -nic user \
                2>&1 | tee /tmp/linux-net.txt

          echo ""
          echo "=== Linux ping result ==="
          if grep -q "0% packet loss" /tmp/linux-net.txt; then
            echo "PASS: Linux ping succeeded"
          else
            echo "FAIL: Linux ping failed"
            cat /tmp/linux-net.txt | grep -E "PING|bytes from|packet loss|sendto"
            exit 1
          fi

      - name: Upload network test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: net-test-logs
          path: /tmp/*-net.txt
          retention-days: 7

  ive-test:
    name: IVE register tests (19 ops)
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfdt1 libglib2.0-0 libpixman-1-0

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Download IVE test initramfs
        uses: actions/download-artifact@v4
        with:
          name: ive-test-cpio
          path: qemu-boot/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Download EV300 kernel
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.hi3516ev300-nor-lite.tgz" \
              -o openipc.hi3516ev300-nor-lite.tgz
          tar xzf openipc.hi3516ev300-nor-lite.tgz

      - name: Run IVE register-level tests
        timeout-minutes: 2
        run: |
          timeout 60 ./qemu-src/build/qemu-system-arm \
            -M hi3516ev300 -m 128M \
            -kernel qemu-boot/uImage.hi3516ev300 \
            -initrd qemu-boot/test-ive.cpio \
            -nographic -serial mon:stdio \
            -append "console=ttyAMA0,115200 mem=96M mmz_allocator=hisi mmz=anonymous,0,0x46000000,32M" \
            2>&1 | tee ive-output.txt || true

          echo ""
          echo "=== IVE Test Results ==="
          grep -E 'PASS|FAIL|Result' ive-output.txt

          # Verify all 19 tests passed
          if grep -q "Result: 19/19 passed" ive-output.txt; then
            echo "=== All IVE tests passed ==="
          else
            echo "=== IVE test FAILURE ==="
            exit 1
          fi

      - name: Upload IVE test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ive-test-log
          path: ive-output.txt
          retention-days: 7

  boot:
    name: Boot ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hi3516cv100
            soc: hi3516cv100
            machine: hi3516cv100
            mem: 64M
            kernel: uImage.hi3516cv100
            rootfs: rootfs.squashfs.hi3516cv100
            append: "console=ttyAMA0,115200 mem=64M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"

          - name: hi3516cv200
            soc: hi3516cv200
            machine: hi3516cv200
            mem: 64M
            kernel: uImage.hi3516cv200
            rootfs: rootfs.squashfs.hi3516cv200
            append: "console=ttyAMA0,115200 mem=32M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"

          - name: hi3516av100
            soc: hi3516av100
            machine: hi3516av100
            mem: 256M
            kernel: uImage.hi3516av100
            rootfs: rootfs.squashfs.hi3516av100
            append: "console=ttyAMA0,115200 earlyprintk mem=256M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"


          - name: hi3516cv300
            soc: hi3516cv300
            machine: hi3516cv300
            mem: 128M
            kernel: uImage.hi3516cv300
            rootfs: rootfs.squashfs.hi3516cv300
            append: "console=ttyAMA0,115200 earlyprintk mem=128M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"


          - name: hi3516cv500
            soc: hi3516cv500
            machine: hi3516cv500
            mem: 128M
            kernel: uImage.hi3516cv500
            rootfs: rootfs.squashfs.hi3516cv500
            append: "console=ttyAMA0,115200 earlyprintk mem=128M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"


          - name: hi3519v101
            soc: hi3519v101
            machine: hi3519v101
            mem: 256M
            kernel: uImage.hi3519v101
            rootfs: rootfs.squashfs.hi3519v101
            append: "console=ttyAMA0,115200 earlyprintk mem=256M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"


          - name: hi3516ev300
            soc: hi3516ev300
            machine: hi3516ev300
            mem: 128M
            kernel: uImage.hi3516ev300
            rootfs: rootfs.squashfs.hi3516ev300
            append: "console=ttyAMA0,115200 earlyprintk mem=96M root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data) mmz_allocator=hisi mmz=anonymous,0,0x46000000,32M"


          # hi3516cv610 (V5) excluded: no OpenIPC firmware release yet

    continue-on-error: ${{ matrix.allow_failure == true }}

    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfdt1 libglib2.0-0 libpixman-1-0

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Download firmware
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.${{ matrix.soc }}-nor-lite.tgz" \
              -o "openipc.${{ matrix.soc }}-nor-lite.tgz"
          tar xzf "openipc.${{ matrix.soc }}-nor-lite.tgz"

      - name: Boot test
        timeout-minutes: 6
        run: |
          timeout 300 ./qemu-src/build/qemu-system-arm \
            -M ${{ matrix.machine }} -m ${{ matrix.mem }} \
            -kernel "qemu-boot/${{ matrix.kernel }}" \
            -initrd "qemu-boot/${{ matrix.rootfs }}" \
            -nographic -serial mon:stdio \
            -append '${{ matrix.append }}' \
            -d unimp,guest_errors -D qemu-boot/qemu.log \
            2>&1 | tee boot-output.txt &
          QEMU_PID=$!

          # Wait for login prompt
          for i in $(seq 1 300); do
            if grep -qE "login:|#\s*$" boot-output.txt 2>/dev/null; then
              echo ""
              echo "=== Boot successful: login prompt reached ==="
              kill $QEMU_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "=== TIMEOUT: login prompt not reached ==="
          echo "--- Last 30 lines of output ---"
          tail -30 boot-output.txt
          kill $QEMU_PID 2>/dev/null || true
          exit 1

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log-${{ matrix.name }}
          path: |
            boot-output.txt
            qemu-boot/qemu.log
          retention-days: 7
